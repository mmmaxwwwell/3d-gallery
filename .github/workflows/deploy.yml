name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad

      - name: Install OpenSCAD libraries (BOSL2, scadqr)
        run: |
          LIBDIR="$HOME/.local/share/OpenSCAD/libraries"
          mkdir -p "$LIBDIR"
          git clone --depth 1 https://github.com/BelfrySCAD/BOSL2.git "$LIBDIR/BOSL2"
          curl -fsSL https://raw.githubusercontent.com/xypwn/scadqr/main/qr.scad -o "$LIBDIR/qr.scad"

      - name: Fetch OpenSCAD WASM files
        run: |
          rm -rf public/wasm
          mkdir -p public/wasm
          BASE="https://raw.githubusercontent.com/mmmaxwwwell/openscad-web-generator/main/public/wasm"
          for f in openscad.js openscad.wasm openscad.wasm.js openscad.fonts.js openscad.mcad.js openscad.bosl2.js openscad.qr.js; do
            curl -fsSL "$BASE/$f" -o "public/wasm/$f"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build models (OpenSCAD → STL/3MF)
        run: npm run build:models

      - name: Build site
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
